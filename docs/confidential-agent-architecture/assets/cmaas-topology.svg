<title>cmaas</title>
<text x="80" y="80" text-anchor="start" font-size="38" font-weight="800" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="80" dy="0.0">CMaaS：只允许双向证明 Mesh 访问的机密记忆服务</tspan></text><rect x="95" y="235" width="380" height="310" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="2.4" filter="url(#shadow)"/><rect x="95" y="235" width="380" height="8" rx="4" fill="#2563eb"/><text x="285.0" y="285" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="285.0" dy="0.0">cmaas-agent TDX</tspan><tspan x="285.0" dy="37.8">Guest</tspan></text><text x="285.0" y="331" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="285.0" dy="0.0">读取 service-directory</tspan><tspan x="285.0" dy="28.4">通过本地 alias 调用 memory</tspan><tspan x="285.0" dy="28.4">API</tspan><tspan x="285.0" dy="28.4">携带自身 attestation</tspan><tspan x="285.0" dy="28.4">evidence</tspan></text><rect x="610" y="235" width="380" height="310" rx="22" fill="#ffffff" stroke="#16a34a" stroke-width="2.4" filter="url(#shadow)"/><rect x="610" y="235" width="380" height="8" rx="4" fill="#16a34a"/><text x="800.0" y="285" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">cmaas TDX Guest</tspan></text><text x="800.0" y="331" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">TNG :8000</tspan><tspan x="800.0" dy="28.4">confidential mesh</tspan><tspan x="800.0" dy="28.4">access proxy /</tspan><tspan x="800.0" dy="28.4">mcp-proxy</tspan><tspan x="800.0" dy="28.4">MCP memory JSONL</tspan><tspan x="800.0" dy="28.4">位于加密可写层</tspan></text><rect x="1125" y="235" width="330" height="310" rx="22" fill="#ffffff" stroke="#dc2626" stroke-width="2.4" filter="url(#shadow)"/><rect x="1125" y="235" width="330" height="8" rx="4" fill="#dc2626"/><text x="1290.0" y="285" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1290.0" dy="0.0">Non-TEE ECS</tspan></text><text x="1290.0" y="331" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1290.0" dy="0.0">安全组可放行网络</tspan><tspan x="1290.0" dy="28.4">但无法提供合格 quote</tspan><tspan x="1290.0" dy="28.4">TLS/RA 握手失败</tspan></text><line x1="475" y1="390" x2="610" y2="390" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/><text x="542.5" y="378.0" text-anchor="middle" font-size="18" font-weight="600" fill="#16a34a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="542.5" dy="0.0">双向 RA</tspan></text><line x1="1125" y1="390" x2="990" y2="390" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow2)"/><text x="1057.5" y="378.0" text-anchor="middle" font-size="17" font-weight="600" fill="#dc2626" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1057.5" dy="0.0">握手前被拒</tspan></text><rect x="330" y="640" width="950" height="120" rx="22" fill="#ffffff" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/><rect x="330" y="640" width="950" height="8" rx="4" fill="#7c3aed"/><text x="805.0" y="690" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="805.0" dy="0.0">可验证事实</tspan></text><text x="805.0" y="736" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="805.0" dy="0.0">合法 attested agent 可写读 marker；非 TEE 请求不会进入 access</tspan><tspan x="805.0" dy="28.4">proxy；离线快照搜索不到明文 marker</tspan></text></svg>
