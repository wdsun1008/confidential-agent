<text x="80" y="80" text-anchor="start" font-size="40" font-weight="800" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="80" dy="0.0">PEP 工具执行边界：Agent 行动前的策略门</tspan></text><rect x="100" y="245" width="300" height="210" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="2.4" filter="url(#shadow)"/><rect x="100" y="245" width="300" height="8" rx="4" fill="#2563eb"/><text x="250.0" y="295" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="250.0" dy="0.0">Agent</tspan><tspan x="250.0" dy="37.8">Runtime</tspan></text><text x="250.0" y="341" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="250.0" dy="0.0">模型生成工具调用</tspan><tspan x="250.0" dy="28.4">exec / attest /</tspan><tspan x="250.0" dy="28.4">MCP tool</tspan></text><rect x="510" y="245" width="300" height="210" rx="22" fill="#ffffff" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/><rect x="510" y="245" width="300" height="8" rx="4" fill="#7c3aed"/><text x="660.0" y="295" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="660.0" dy="0.0">cai-pep</tspan></text><text x="660.0" y="341" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="660.0" dy="0.0">JSON-RPC Intent</tspan><tspan x="660.0" dy="28.4">路径 / 命令 / 策略检查</tspan></text><rect x="920" y="245" width="300" height="210" rx="22" fill="#ffffff" stroke="#16a34a" stroke-width="2.4" filter="url(#shadow)"/><rect x="920" y="245" width="300" height="8" rx="4" fill="#16a34a"/><text x="1070.0" y="295" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1070.0" dy="0.0">Sandbox</tspan></text><text x="1070.0" y="341" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1070.0" dy="0.0">read-only rootfs</tspan><tspan x="1070.0" dy="28.4">no network</tspan><tspan x="1070.0" dy="28.4">cap-drop /</tspan><tspan x="1070.0" dy="28.4">resource limits</tspan></text><rect x="1245" y="245" width="250" height="210" rx="22" fill="#ffffff" stroke="#f59e0b" stroke-width="2.4" filter="url(#shadow)"/><rect x="1245" y="245" width="250" height="8" rx="4" fill="#f59e0b"/><text x="1370.0" y="295" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1370.0" dy="0.0">Attest</tspan><tspan x="1370.0" dy="37.8">Helper</tspan></text><text x="1370.0" y="341" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1370.0" dy="0.0">受控例外路径</tspan><tspan x="1370.0" dy="28.4">collect-and-v</tspan><tspan x="1370.0" dy="28.4">erify</tspan></text><line x1="400" y1="350" x2="510" y2="350" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/><line x1="810" y1="350" x2="920" y2="350" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/><line x1="810" y1="430" x2="1245" y2="430" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)"/><rect x="190" y="610" width="520" height="140" rx="22" fill="#ffffff" stroke="#16a34a" stroke-width="2.4" filter="url(#shadow)"/><rect x="190" y="610" width="520" height="8" rx="4" fill="#16a34a"/><text x="450.0" y="660" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="450.0" dy="0.0">基础设施保证</tspan></text><text x="450.0" y="706" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="450.0" dy="0.0">把危险执行路径收束到明确</tspan><tspan x="450.0" dy="28.4">PEP，降低任意命令、联网和资源滥用风险</tspan></text><rect x="890" y="610" width="520" height="140" rx="22" fill="#ffffff" stroke="#dc2626" stroke-width="2.4" filter="url(#shadow)"/><rect x="890" y="610" width="520" height="8" rx="4" fill="#dc2626"/><text x="1150.0" y="660" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1150.0" dy="0.0">应用层仍需处理</tspan></text><text x="1150.0" y="706" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1150.0" dy="0.0">业务审批、API scope、语义意图、输出过滤与</tspan><tspan x="1150.0" dy="28.4">prompt injection 防护</tspan></text></svg>
