<text x="80" y="80" text-anchor="start" font-size="40" font-weight="800" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="80" dy="0.0">RATS-TLS 数据面：Connect 与 Confidential Mesh</tspan></text><rect x="95" y="225" width="330" height="210" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="2.4" filter="url(#shadow)"/><rect x="95" y="225" width="330" height="8" rx="4" fill="#2563eb"/><text x="260.0" y="275" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="260.0" dy="0.0">Connect 端口</tspan></text><text x="260.0" y="321" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="260.0" dy="0.0">Host / A2A / 非 TEE</tspan><tspan x="260.0" dy="28.4">caller</tspan><tspan x="260.0" dy="28.4">单向 RA：caller 验证</tspan><tspan x="260.0" dy="28.4">callee</tspan></text><rect x="635" y="225" width="330" height="210" rx="22" fill="#ffffff" stroke="#16a34a" stroke-width="2.4" filter="url(#shadow)"/><rect x="635" y="225" width="330" height="8" rx="4" fill="#16a34a"/><text x="800.0" y="275" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">Confidential</tspan><tspan x="800.0" dy="37.8">Mesh</tspan></text><text x="800.0" y="321" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">同一可信 mesh 内服务</tspan><tspan x="800.0" dy="28.4">双向 RA：双方都出示 quote</tspan></text><rect x="1175" y="225" width="330" height="210" rx="22" fill="#ffffff" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/><rect x="1175" y="225" width="330" height="8" rx="4" fill="#7c3aed"/><text x="1340.0" y="275" text-anchor="middle" font-