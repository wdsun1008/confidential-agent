<text x="80" y="80" text-anchor="start" font-size="42" font-weight="800" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="80" dy="0.0">三层可验证信任链</tspan></text><rect x="120" y="230" width="360" height="310" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="2.4" filter="url(#shadow)"/><rect x="120" y="230" width="360" height="8" rx="4" fill="#2563eb"/><text x="300.0" y="280" text-anchor="middle" font-size="32" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="300.0" dy="0.0">1 镜像可度量</tspan></text><text x="300.0" y="326" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="300.0" dy="0.0">AppSpec</tspan><tspan x="300.0" dy="28.4">Shelter Build</tspan><tspan x="300.0" dy="28.4">UKI + dm-verity</tspan><tspan x="300.0" dy="28.4">Reference Values</tspan></text><line x1="480" y1="385" x2="600" y2="385" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/><rect x="600" y="230" width="360" height="310" rx="22" fill="#ffffff" stroke="#0891b2" stroke-width="2.4" filter="url(#shadow)"/><rect x="600" y="230" width="360" height="8" rx="4" fill="#0891b2"/><text x="780.0" y="280" text-anchor="middle" font-size="32" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="780.0" dy="0.0">2 启动可证明</tspan></text><text x="780.0" y="326" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="780.0" dy="0.0">TDX Quote</tspan><tspan x="780.0" dy="28.4">UEFI Event Log</tspan><tspan x="780.0" dy="28.4">Policy Appraisal</tspan><tspan x="780.0" dy="28.4">Fresh Challenge</tspan></text><line x1="960" y1="385" x2="1080" y2="385" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/><rect x="1080" y="230" width="360" height="310" rx="22" fill="#ffffff" stroke="#16a34a" stroke-width="2.4" filter="url(#shadow)"/><rect x="1080" y="230" width="360" height="8" rx="4" fill="#16a34a"/><text x="1260.0" y="280" text-anchor="middle" font-size="32" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1260.0" dy="0.0">3 资源按需释放</tspan></text><text x="1260.0" y="326" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="1260.0" dy="0.0">Bootstrap</tspan><tspan x="1260.0" dy="28.4">Disk Passphrase</tspan><tspan x="1260.0" dy="28.4">App Secrets</tspan><tspan x="1260.0" dy="28.4">Mesh Bundle</tspan></text><line x1="300" y1="540" x2="1280" y2="690" stroke="#5b667a" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow2)"/><text x="790.0" y="603.0" text-anchor="middle" font-size="17" font-weight="600" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="790.0" dy="0.0">Reference</tspan><tspan x="790.0" dy="23.0">Values 约束</tspan><tspan x="790.0" dy="23.0">Quote 与资源释放</tspan></text><rect x="520" y="675" width="560" height="120" rx="22" fill="#ffffff" stroke="#7c3aed" stroke-width="2.4" filter="url(#shadow)"/><rect x="520" y="675" width="560" height="8" rx="4" fill="#7c3aed"/><text x="800.0" y="725" text-anchor="middle" font-size="28" font-weight="700" fill="#172033" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">安全属性</tspan></text><text x="800.0" y="771" text-anchor="middle" font-size="21" font-weight="400" fill="#5b667a" font-family="Noto Sans CJK SC, Noto Sans CJK, Noto Sans, Arial, sans-serif"><tspan x="800.0" dy="0.0">Measurement 不匹配的实例拿不到</tspan><tspan x="800.0" dy="28.4">secret，也无法进入可信数据面</tspan></text></svg>
