<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Confidential Agent 安全架构</title>
  <desc id="desc">展示硬件层、启动链、运行时、密钥管理和通信链路五层保护机制。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; rx: 12; }
      .layer { fill: #f1f6ff; stroke: #6c8fd6; stroke-width: 2; rx: 10; }
      .secure { fill: #eef8f2; stroke: #4f9b69; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7e8; stroke: #d6972d; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .title { font-size: 30px; font-weight: 700; }
      .h2 { font-size: 21px; font-weight: 700; }
      .body { font-size: 16px; }
      .small { font-size: 14px; fill: #4b5563; }
      .arrow { stroke: #667085; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="720"/>
  <text class="text title" x="52" y="58">Confidential Agent 安全架构</text>
  <text class="text small" x="52" y="88">从硬件、启动、运行时、密钥到访问链路逐层建立可信边界</text>

  <rect class="panel" x="52" y="122" width="1076" height="542"/>

  <rect class="layer" x="104" y="540" width="972" height="82"/>
  <text class="text h2" x="132" y="574">硬件层：Intel TDX Trust Domain</text>
  <text class="text body" x="132" y="603">Guest 内存透明加密，云平台和宿主机无法读取 OpenClaw 运行时明文数据</text>

  <rect class="layer" x="104" y="430" width="972" height="82"/>
  <text class="text h2" x="132" y="464">启动链：UKI + dm-verity + Rekor</text>
  <text class="text body" x="132" y="493">可信镜像构建后提取度量值并上传 Rekor，启动时验证 UKI 与 rootfs 完整性</text>

  <rect class="secure" x="104" y="320" width="972" height="82"/>
  <text class="text h2" x="132" y="354">运行时：OpenClaw + cai-pep 策略沙箱</text>
  <text class="text body" x="132" y="383">命令黑名单、敏感路径保护、无网络 sandbox，降低 Prompt 注入后的横向移动风险</text>

  <rect class="secure" x="104" y="210" width="972" height="82"/>
  <text class="text h2" x="132" y="244">密钥管理：远程证明通过后注入机密资源</text>
  <text class="text body" x="132" y="273">磁盘密钥、百炼 API Key、钉钉凭据和 Gateway Token 不进入镜像明文</text>

  <rect class="warn" x="104" y="150" width="448" height="38"/>
  <text class="text body" x="132" y="175">部署机持有 operator 权限，仅放通必要 CIDR</text>
  <rect class="warn" x="628" y="150" width="448" height="38"/>
  <text class="text body" x="656" y="175">用户入口经 TNG RATS-TLS 加密通道访问</text>

  <path class="arrow" d="M590 540 L590 512"/>
  <path class="arrow" d="M590 430 L590 402"/>
  <path class="arrow" d="M590 320 L590 292"/>
  <path class="arrow" d="M552 169 L628 169"/>

  <text class="text small" x="104" y="690">保护对象：用户对话隐私 / Agent 记忆与状态 / 服务凭证</text>
</svg>
