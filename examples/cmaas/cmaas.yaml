schema: confidential-agent/v1

service:
  id: cmaas
  ports: [8000]
  connect: []
  mcp_ports: [8000]
  app_service: cai-cmaas-mcp-proxy.service

build:
  image_name: cmaas-memory
  resize: 30G
  with_network: true
  packages: [ca-certificates, curl, jq, nodejs, npm, tar, xz]
  scripts: [./install-cmaas.sh]
  variants:
    release:
      enabled: true
    debug:
      enabled: true

deploy:
  provider: aliyun
  image_variant: debug
  instance_type: ecs.g8i.xlarge
  region: cn-beijing
  zone_id: cn-beijing-l
  disk_gb: 200

attestation:
  tee: tdx
  mode: challenge
  reference_values: rekor
  rekor:
    cosign_key: ./cosign.key
    slsa_generator: /usr/libexec/shelter/slsa/slsa-generator
    required: true

resources: {}
