schema: confidential-agent/v1

service:
  id: mcp
  ports:
    - 3001
  connect: []
  app_service: cai-mcp-server.service

build:
  image_name: mcp-agent
  resize: 30G
  with_network: true
  packages:
    - ca-certificates
    - nodejs
    - npm
  scripts:
    - ./install-mcp.sh
  variants:
    release:
      enabled: true
    debug:
      enabled: true

deploy:
  provider: aliyun
  image_variant: debug
  instance_type: ecs.g8i.xlarge
  region: cn-beijing
  zone_id: cn-beijing-l
  disk_gb: 200

attestation:
  tee: tdx
  mode: challenge
  reference_values: rekor
  rekor:
    cosign_key: ./cosign.key
    slsa_generator: /usr/libexec/shelter/slsa/slsa-generator
    required: true

resources: {}
