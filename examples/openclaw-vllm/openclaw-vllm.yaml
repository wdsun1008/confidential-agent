schema: confidential-agent/v1

service:
  id: openclaw-vllm
  ports:
    - 18789
  connect:
    - 18789
  app_service: cai-openclaw-gateway.service

build:
  image_name: openclaw-vllm-agent
  kernel_cmdline_append: swiotlb=4194304,any rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nouveau.modeset=0
  resize: 80G
  packages:
    - binutils
    - ca-certificates
    - curl
    - dracut
    - elfutils-libelf-devel
    - gcc
    - glibc-devel
    - jq
    - kernel-devel-5.10.134-19.1.al8
    - kernel-headers
    - kmod
    - make
    - nodejs
    - npm
    - openssl3
    - pciutils
    - pkgconf-pkg-config
    - podman
    - python3.11
    - python3.11-devel
    - python3.11-pip
    - rpm
    - tar
    - wget
    - xz
    - zlib-devel
  files:
    - source: ./nvidia-persistenced.service
      target: /usr/local/share/cai/nvidia-persistenced.service
    - source: ./cai-nvidia-cc-stack-install.sh
      target: /usr/local/sbin/cai-nvidia-cc-stack-install.sh
      executable: true
    - source: ../../target/debug/cai-pep
      target: /usr/local/bin/cai-pep
      executable: true
    - source: ../openclaw/files/tdx-remote-attestation.SKILL.md
      target: /home/openclaw/.openclaw/skills/tdx-remote-attestation/SKILL.md
    - source: ../openclaw/files/install-cai-pep.sh
      target: /usr/local/libexec/confidential-agent/openclaw/install-cai-pep.sh
      executable: true
    - source: ../openclaw/files/cai-pep-default-policy.json
      target: /usr/local/share/confidential-agent/openclaw/cai-pep-default-policy.json
    - source: ../openclaw/files/cai-pep-plugin
      target: /usr/local/share/confidential-agent/openclaw/cai-pep-plugin
    - source: ../openclaw/files/cai-a2a-plugin
      target: /usr/local/share/confidential-agent/openclaw/cai-a2a-plugin
    - source: ../openclaw/files/patch-openclaw-cai-pep.js
      target: /usr/local/share/confidential-agent/openclaw/patch-openclaw-cai-pep.js
      executable: true
  scripts:
    - ./install-openclaw-vllm.sh
  variants:
    release:
      enabled: true
    debug:
      enabled: true

deploy:
  provider: aliyun
  image_variant: debug
  instance_type: ecs.gn8v-tee.4xlarge
  region: cn-beijing
  zone_id: cn-beijing-l
  disk_gb: 512

attestation:
  tee: tdx
  mode: challenge
  reference_values: rekor
  rekor:
    cosign_key: ./cosign.key
    slsa_generator: /usr/libexec/shelter/slsa/slsa-generator
    required: true

a2a:
  id: openclaw-vllm
  name: openclaw-vllm
  version: "1.0.0"
  description: "OpenClaw vLLM confidential agent"
  skills:
    - id: chat
      name: Chat
      description: "OpenClaw gateway chat"

resources:
  openclaw_config:
    source: ./openclaw-vllm.json
    target: /home/openclaw/.openclaw/openclaw.json
    owner: openclaw
    group: openclaw
    mode: "0600"
    required: true
