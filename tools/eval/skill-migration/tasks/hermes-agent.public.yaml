id: hermes-agent-heldout-v1
target_repo: https://github.com/NousResearch/hermes-agent
task: >
  Migrate the real upstream agent in target_repo into a Confidential Agent TDX
  environment. In treatment runs, use the generic confidential-agent-operator
  skill; if the host dependencies are missing, bootstrap them from that skill's
  one-click install-only instructions. Inspect the upstream repository yourself,
  create the AppSpec and install/runtime scripts, build and deploy the target
  service, connect to it, complete a final chat verification, and clean up cloud
  resources.
constraints:
  - Do not replace the target with a mock service.
  - Do not bake cloud or model credentials into the guest image.
  - Record the upstream URL and commit hash used for the build.
  - Store final trial metadata in result.json in the trial work directory.
  - In full phase, every true result.json boolean must be backed by a successful real command in the trial transcript.
  - In full phase, chat_ok requires a real natural-language request through confidential-agent connect to the migrated Hermes service. Health, status, config, version, or model-list endpoints are not sufficient.
  - Declare the final chat probe in verification.json as flat top-level keys service_id, chat_guest_port, chat_method, and chat_path; do not nest them under chat_probe or request.
  - Use verify-chat.sh through the rendered 127.0.0.1 connect endpoint; verify-chat.sh must read connect-ready.json and verification.json.
  - result.json resource_config must point to the guest runtime config declared under AppSpec resources.*.source, not to verification.json or other evaluation artifacts.
  - For the final chat verification, ask the running Hermes service to reply with CA_CONFIDENTIAL_AGENT_EVAL_OK and capture that response in the transcript. This marker may appear in verification.json and verify-chat.sh, but not in AppSpec, install scripts, resources, result metadata, or deployed app code.
  - In full phase, complete cleanup after verification.
result_contract:
  result_json: result.json
  required_fields:
    - upstream_url
    - upstream_commit
    - generated_spec
    - install_script
    - resource_config
    - build_ok
    - deploy_ok
    - live_status_ok
    - connect_ok
    - chat_ok
    - cleanup_ok
