{
  // *** ATTENTION : This file is in JSON format so the keys are case sensitive. Don't change them.

  // PCCS server address. This follows the Trustee default for Aliyun.
  "pccs_url": "https://sgx-dcap-server.cn-beijing.aliyuncs.com/sgx/certification/v4/"

  // To accept insecure HTTPS certificate, set this option to false.
  ,"use_secure_cert": true

  // You can use Intel PCS or another PCCS to get quote verification collateral.
  // Retrieval of PCK certificates always uses the PCCS described in pccs_url.
  // When collateral_service is not defined, both PCK certs and verification
  // collateral are retrieved using pccs_url.
  //,"collateral_service": "https://api.trustedservices.intel.com/sgx/certification/v4/"

  // If you use a PCCS service to get quote verification collateral, you can
  // specify which PCCS API version is used.
  //,"pccs_api_version": "3.1"

  // Maximum retry times for QCNL. If retry_times is not defined or set to 0,
  // no retry is performed.
  ,"retry_times": 6

  // Sleep this many seconds before each retry when a transfer failed with a
  // transient error.
  ,"retry_delay": 10

  // If local_pck_url is defined, QCNL tries to retrieve PCK cert chain from
  // local_pck_url first, then fail over to pccs_url.
  //,"local_pck_url": "http://localhost:8081/sgx/certification/v4/"

  // If local_pck_url is not defined, a non-zero pck_cache_expire_hours enables
  // local cache.
  ,"pck_cache_expire_hours": 168

  // Cache expiration for quote verification collateral, in hours.
  ,"verify_collateral_cache_expire_hours": 168
}
